<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca — El Recetario</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="cabecera">
  <div class="cabecera-fila">
    <a href="inicio.html" class="marca"><img src="assets/logo.png" class="logo-icono" alt=""><span id="nombre-recetario">El Recetario</span></a>
    <a href="editar.html" class="btn btn-principal">+ Nueva receta</a>
    <button class="btn btn-fantasma" id="btn-salir">Salir</button>
  </div>
</header>

<div class="contenedor">

  <section class="seccion" style="margin-top:30px">
    <div class="seccion-cabecera">
      <h2>Todas las recetas</h2>
    </div>

    <div class="barra-herramientas">
      <input type="search" id="buscador" placeholder="Buscar por nombre o ingrediente">
      <select id="filtro-categoria">
        <option value="">Todas las categorías</option>
      </select>
      <button class="toggle-favoritas" id="toggle-favoritas">
        <svg class="icono" viewBox="0 0 24 24"><path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1L6.6 19.3l1.3-6-4.6-4.1 6.1-.6Z"/></svg>
        Favoritas
      </button>
    </div>

    <div class="indice-alfabetico-movil" id="indice-movil"></div>

    <div class="diseno-recetario">
      <nav class="indice-alfabetico" id="indice-lateral" aria-label="Índice alfabético"></nav>
      <div>
        <div class="cargando" id="cargando">Cargando…</div>
        <div id="contenedor-recetas"></div>
      </div>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/biblioteca.js"></script>
</body>
</html>
