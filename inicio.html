<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Recetario</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="cabecera">
  <div class="cabecera-fila">
    <a href="inicio.html" class="marca"><img src="assets/logo.png" class="logo-icono" alt=""><span id="nombre-recetario">El Recetario</span></a>
    <nav class="nav-principal">
      <a href="biblioteca.html" class="nav-link ">Biblioteca</a>
      <a href="editar.html" class="nav-link ">+ Nueva receta</a>
    </nav>
    <button class="btn btn-fantasma" id="btn-salir">Salir</button>
  </div>
</header>

<div class="contenedor">

  <section class="seccion" style="margin-top:34px">
    <div class="tarjetas-nav">
      <a href="biblioteca.html" class="tarjeta-nav">
        <span class="tarjeta-nav-icono">
          <svg class="icono" viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h13v17H6a2 2 0 0 0-2 2Z"/><path d="M4 5v14a2 2 0 0 0 2 2h13"/><path d="M8 7h7"/></svg>
        </span>
        <span class="tarjeta-nav-titulo">Biblioteca de recetas</span>
        <span class="tarjeta-nav-desc">Consulta, busca y filtra todas las recetas</span>
      </a>
      <a href="editar.html" class="tarjeta-nav">
        <span class="tarjeta-nav-icono">
          <svg class="icono" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </span>
        <span class="tarjeta-nav-titulo">Nueva receta</span>
        <span class="tarjeta-nav-desc">Añade una receta con fotos, ingredientes y pasos</span>
      </a>
    </div>
  </section>

  <section class="seccion oculto" id="seccion-recientes">
    <div class="seccion-cabecera">
      <span class="eyebrow">Últimos cambios</span>
    </div>
    <div class="franja-recientes" id="franja-recientes"></div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/inicio.js"></script>
</body>
</html>
