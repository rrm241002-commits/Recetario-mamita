<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Recetario</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="sin-lineas">

<div class="pantalla-login">
  <form class="tarjeta-login" id="form-login">
    <h1 style="font-size:1.5rem; margin-bottom:24px;">Iniciar sesión</h1>

    <div class="campo" style="text-align:left">
      <label for="email">Correo</label>
      <input type="email" id="email" required autocomplete="username">
    </div>
    <div class="campo" style="text-align:left">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required autocomplete="current-password">
    </div>

    <button type="submit" class="btn btn-principal" style="width:100%; justify-content:center" id="btn-entrar">Entrar</button>
    <p class="error-login" id="error-login"></p>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
